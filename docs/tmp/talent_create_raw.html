<style>
        body {
            background-color: #101415;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .radial-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(107, 216, 203, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 10% 80%, rgba(196, 193, 251, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .floating-label-group {
            position: relative;
        }

        .floating-label-group input:focus ~ label,
        .floating-label-group input:not(:placeholder-shown) ~ label {
            transform: translateY(-24px) scale(0.85);
            color: #6bd8cb;
        }

        .floating-label-group label {
            position: absolute;
            top: 14px;
            left: 16px;
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        .slide-over {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-over.active {
            transform: translateX(0);
        }

        .custom-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            background: transparent;
            transition: all 0.2s;
        }

        .custom-checkbox:checked {
            background: #6bd8cb;
            border-color: #6bd8cb;
        }

        .custom-checkbox:checked::after {
            content: 'check';
            font-family: 'Material Symbols Outlined';
            font-size: 14px;
            color: #003732;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

                Cancelar
            </button>
<button class="flex-1 font-label-sm text-label-sm px-md py-sm bg-[#0D9488] hover:bg-[#12b4a3] text-white rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-95 text-center">
                Guardar Postulante
            </button>

</aside>
<script>
        function closeModal() {
            const slideOver = document.getElementById('slide-over');
            const overlay = document.getElementById('modal-overlay');
            
            slideOver.classList.remove('active');
            overlay.classList.add('opacity-0');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        // Dropzone simple visual feedback
        const dropzone = document.querySelector('.border-dashed');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.add('border-primary', 'bg-primary/10');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.remove('border-primary', 'bg-primary/10');
            }, false);
        });
    </script>
